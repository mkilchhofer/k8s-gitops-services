{{- $context := dict "Chart" .Chart "Release" .Release "Values" .Values "Capabilities" .Capabilities }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: github-webhook
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: eg-external
      group: gateway.networking.k8s.io
      kind: Gateway
      namespace: envoy-gateway-system
  hostnames:
    - github-exporter.kilchhofer.info
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: {{ template "github-exporter.fullname" $context }}
          port: {{ (index .Values "github-exporter").service.port }}
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /github
