apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: metrics-server
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: metrics-server
      app.kubernetes.io/name: metrics-server
  ingress:
    - {}
  egress:
    - to:
        - ipBlock:
            cidr: 192.168.92.0/24
      ports:
        - port: 10250
  policyTypes:
    - Ingress
    - Egress
