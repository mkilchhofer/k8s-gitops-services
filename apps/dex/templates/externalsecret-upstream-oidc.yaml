apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dex-upstream-oidc
  namespace: {{ .Release.Namespace }}
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: akeyless-k3s-secrets

  target:
    name: dex-upstream-oidc

  dataFrom:
  - extract:
      key: /k3s/dex/upstream-oidc
